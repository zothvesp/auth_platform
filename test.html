<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPSCTRL — System Administration Console</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #08090b;
  --bg-deep: #0c0e12;
  --bg-surface: #12151a;
  --bg-elevated: #1a1e25;
  --bg-hover: #212630;
  --bg-selected: #262c38;
  --bg-zebra: rgba(255,255,255,0.015);
  --border-subtle: #1e2229;
  --border-medium: #2a3040;
  --border-accent: #3a4458;
  --text-primary: #e8ecf4;
  --text-secondary: #8b95a8;
  --text-muted: #556078;
  --cyan: #00e5ff;
  --cyan-dim: #00b8cc;
  --cyan-weak: rgba(0, 229, 255, 0.08);
  --cyan-focus: rgba(0, 229, 255, 0.4);
  --amber: #ffb800;
  --amber-weak: rgba(255, 184, 0, 0.08);
  --mint: #00d68f;
  --mint-weak: rgba(0, 214, 143, 0.08);
  --coral: #ff3860;
  --coral-weak: rgba(255, 56, 96, 0.08);
  --purple: #a855f7;
  --purple-weak: rgba(168, 85, 247, 0.08);
  --font-display: 'Fraunces', serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'IBM Plex Sans', sans-serif;
  --space-1: 2px; --space-2: 4px; --space-3: 8px; --space-4: 12px;
  --space-5: 16px; --space-6: 20px; --space-7: 24px; --space-8: 32px;
  --space-9: 40px; --space-10: 48px;
  --radius-sm: 3px; --radius-md: 5px; --radius-lg: 8px; --radius-xl: 12px;
  --radius-full: 100%;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
  --shadow-glow-cyan: 0 0 20px rgba(0,229,255,0.2);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --duration-fast: 100ms;
  --duration-base: 200ms;
  --duration-slow: 350ms;
  --sidebar-width: 260px;
  --topbar-height: 52px;
  --form-header-height: 64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font-body);
  background: var(--bg-void);
  color: var(--text-primary);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-accent); }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
  pointer-events: none;
  z-index: 9999;
}

.app-layout { display: flex; height: 100vh; position: relative; z-index: 1; }

/* === SIDEBAR === */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-deep);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.sidebar::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.02), transparent 60%);
  pointer-events: none;
}
.sidebar-brand {
  padding: var(--space-6) var(--space-5) var(--space-5);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: var(--space-4);
}
.brand-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--cyan), var(--cyan-dim));
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-glow-cyan);
  flex-shrink: 0;
}
.brand-icon svg { width: 16px; height: 16px; fill: var(--bg-void); }
.brand-text { display: flex; flex-direction: column; }
.brand-name { font-family: var(--font-mono); font-weight: 600; font-size: 12px; letter-spacing: 2px; }
.brand-sub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; }

.sidebar-nav { flex: 1; padding: var(--space-4) var(--space-3); overflow-y: auto; }
.nav-section { margin-bottom: var(--space-2); }
.nav-section-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: var(--space-4) var(--space-4) var(--space-2); }
.nav-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: 8px var(--space-4); border-radius: var(--radius-md);
  cursor: pointer; transition: all var(--duration-fast) ease;
  position: relative; color: var(--text-secondary);
  font-size: 12.5px; font-weight: 400; text-decoration: none; margin-bottom: 1px;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--bg-elevated); color: var(--cyan); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 16px; background: var(--cyan);
  border-radius: 0 2px 2px 0; box-shadow: 0 0 6px var(--cyan);
}
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.65; }
.nav-item.active svg { opacity: 1; }
.nav-item .badge {
  margin-left: auto; font-family: var(--font-mono); font-size: 9px;
  padding: 1px 6px; border-radius: 8px; background: var(--bg-hover); color: var(--text-muted);
}
.nav-item.active .badge { background: var(--cyan-weak); color: var(--cyan); }

.sidebar-footer { padding: var(--space-3) var(--space-4); border-top: 1px solid var(--border-subtle); }
.sidebar-user { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3); border-radius: var(--radius-md); cursor: pointer; transition: background var(--duration-fast) ease; }
.sidebar-user:hover { background: var(--bg-hover); }
.user-avatar {
  width: 28px; height: 28px; border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 9px; font-weight: 600; color: white; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.5px; }

/* === MAIN === */
.main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; position: relative; }

.topbar {
  height: var(--topbar-height); background: var(--bg-deep);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; padding: 0 var(--space-7);
  gap: var(--space-5); flex-shrink: 0;
}
.breadcrumb { display: flex; align-items: center; gap: var(--space-2); }
.breadcrumb-item { color: var(--text-muted); font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.5px; }
.breadcrumb-sep { color: var(--text-muted); opacity: 0.35; }
.breadcrumb-item.current { color: var(--text-secondary); }
.breadcrumb-item.link { cursor: pointer; }
.breadcrumb-item.link:hover { color: var(--cyan); }
.topbar-spacer { flex: 1; }

.search-box { position: relative; width: 260px; }
.search-box input {
  width: 100%; height: 32px; background: var(--bg-surface);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
  padding: 0 var(--space-4) 0 32px; font-family: var(--font-mono);
  font-size: 10.5px; color: var(--text-primary); outline: none;
  transition: all var(--duration-base) ease;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 1px var(--bg-deep), 0 0 0 3px var(--cyan-focus); }
.search-box svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: var(--text-muted); pointer-events: none; }

.topbar-actions { display: flex; align-items: center; gap: var(--space-1); }
.topbar-btn {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); border: none; background: transparent;
  color: var(--text-secondary); cursor: pointer;
  transition: all var(--duration-fast) ease; position: relative;
}
.topbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.topbar-btn svg { width: 15px; height: 15px; }
.topbar-btn .notif-dot {
  position: absolute; top: 5px; right: 6px; width: 6px; height: 6px;
  background: var(--coral); border-radius: var(--radius-full); border: 1.5px solid var(--bg-deep);
}

/* === CLASSIFICATION === */
.classification {
  display: inline-flex; align-items: center; gap: var(--space-1);
  padding: 2px 7px; border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 8px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.classification.restricted { background: var(--coral-weak); color: var(--coral); border: 1px solid rgba(255,56,96,0.2); }
.classification.confidential { background: var(--amber-weak); color: var(--amber); border: 1px solid rgba(255,184,0,0.2); }
.classification.internal { background: var(--cyan-weak); color: var(--cyan); border: 1px solid rgba(0,229,255,0.15); }
.classification.public { background: var(--mint-weak); color: var(--mint); border: 1px solid rgba(0,214,143,0.15); }

/* === PAGE CONTAINER === */
.page-container { flex: 1; overflow-y: auto; position: relative; }

.page-inner { padding: var(--space-7); }

.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: var(--space-7);
}
.page-title {
  font-family: var(--font-display); font-size: 26px; font-weight: 600;
  letter-spacing: -0.5px; line-height: 1.2;
}
.page-subtitle { font-size: 12.5px; color: var(--text-secondary); margin-top: var(--space-1); }
.page-actions { display: flex; gap: var(--space-3); align-items: center; }

/* === BUTTONS === */
.btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: 7px 13px; border-radius: var(--radius-md);
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 500;
  letter-spacing: 0.3px; border: 1px solid transparent;
  cursor: pointer; transition: all var(--duration-fast) ease;
  white-space: nowrap; text-decoration: none; position: relative;
}
.btn svg { width: 13px; height: 13px; }
.btn-primary { background: var(--cyan); color: var(--bg-void); border-color: var(--cyan); box-shadow: var(--shadow-glow-cyan); }
.btn-primary:hover { background: var(--cyan-dim); box-shadow: 0 0 20px rgba(0,229,255,0.3); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary { background: var(--bg-elevated); color: var(--text-secondary); border-color: var(--border-medium); }
.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-accent); }
.btn-danger { background: transparent; color: var(--coral); border-color: rgba(255,56,96,0.3); }
.btn-danger:hover { background: var(--coral-weak); border-color: var(--coral); }
.btn-ghost { background: transparent; color: var(--text-secondary); border: none; padding: 5px 9px; }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-sm { padding: 4px 9px; font-size: 9px; }
.btn:disabled { opacity: 0.45; cursor: default; pointer-events: none; }

.btn-icon {
  width: 28px; height: 28px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); background: transparent;
  border: 1px solid transparent; color: var(--text-muted);
  cursor: pointer; transition: all var(--duration-fast) ease;
}
.btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-medium); }
.btn-icon svg { width: 13px; height: 13px; }

/* === ALERT === */
.alert-box {
  display: flex; align-items: flex-start; gap: var(--space-4);
  padding: var(--space-5); border-radius: var(--radius-md);
  margin-bottom: var(--space-6); border: 1px solid;
}
.alert-box.info { background: var(--cyan-weak); border-color: rgba(0,229,255,0.2); color: var(--cyan); }
.alert-box.warning { background: var(--amber-weak); border-color: rgba(255,184,0,0.2); color: var(--amber); }
.alert-box.error { background: var(--coral-weak); border-color: rgba(255,56,96,0.2); color: var(--coral); }
.alert-box.success { background: var(--mint-weak); border-color: rgba(0,214,143,0.2); color: var(--mint); }
.alert-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-box-content { flex: 1; }
.alert-box-title { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; margin-bottom: 1px; }
.alert-box-desc { font-size: 12.5px; opacity: 0.9; }

/* === STATS === */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: var(--space-4); margin-bottom: var(--space-7);
}
.stat-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: var(--space-5) var(--space-6);
  position: relative; overflow: hidden;
  transition: border-color var(--duration-base) ease;
}
.stat-card:hover { border-color: var(--border-medium); }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--border-medium); }
.stat-card.highlight::before { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
.stat-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--space-3); }
.stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1; }
.stat-change { font-family: var(--font-mono); font-size: 9px; margin-top: var(--space-2); display: flex; align-items: center; gap: var(--space-1); }
.stat-change.positive { color: var(--mint); }
.stat-change.negative { color: var(--coral); }

/* === TABS === */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border-medium); margin-bottom: var(--space-6); }
.tab {
  padding: 9px var(--space-5); font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: 0.5px; color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all var(--duration-fast) ease; user-select: none;
}
.tab:hover { color: var(--text-secondary); background: var(--bg-hover); }
.tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.tab .tab-badge {
  display: inline-flex; margin-left: var(--space-2);
  padding: 0 5px; border-radius: 8px; background: var(--bg-hover);
  font-size: 9px; color: var(--text-muted); line-height: 16px;
}
.tab.active .tab-badge { background: var(--cyan-weak); color: var(--cyan); }

/* === TABLE === */
.table-container { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; }
.table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--border-subtle); gap: var(--space-4); }
.table-search { position: relative; }
.table-search input {
  height: 28px; width: 200px; background: var(--bg-deep);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
  padding: 0 var(--space-3) 0 28px; font-family: var(--font-mono);
  font-size: 10.5px; color: var(--text-primary); outline: none;
  transition: all var(--duration-fast) ease;
}
.table-search input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 1px var(--bg-deep), 0 0 0 3px var(--cyan-focus); }
.table-search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; color: var(--text-muted); pointer-events: none; }
.table-filters { display: flex; gap: var(--space-2); }
.data-table { width: 100%; border-collapse: collapse; }

.data-table th {
  font-family: var(--font-mono); font-size: 9px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted);
  padding: 9px var(--space-5); text-align: left;
  border-bottom: 1px solid var(--border-medium); background: var(--bg-deep);
  position: sticky; top: 0; z-index: 10; white-space: nowrap;
}
.data-table td { padding: 10px var(--space-5); border-bottom: 1px solid var(--border-subtle); font-size: 12.5px; vertical-align: middle; transition: background var(--duration-fast) ease; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr:nth-child(even) td { background: var(--bg-zebra); }
.data-table tbody tr:hover td { background: var(--bg-hover) !important; }
.data-table tbody tr:focus-within td { background: var(--bg-selected) !important; box-shadow: inset 3px 0 0 var(--cyan); }
.data-table tr.deleted td { opacity: 0.5; text-decoration: line-through; text-decoration-color: var(--text-muted); }
.data-table tr.deleted:hover td { opacity: 0.7; }

.table-cell-user { display: flex; align-items: center; gap: var(--space-3); }
.table-avatar {
  width: 26px; height: 26px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 9px; font-weight: 600; color: white; flex-shrink: 0;
}
.table-cell-main { font-weight: 500; }
.table-cell-sub { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); margin-top: 1px; }

.status-badge { display: inline-flex; align-items: center; gap: var(--space-2); padding: 2px 7px; border-radius: 10px; font-family: var(--font-mono); font-size: 9px; font-weight: 500; }
.status-badge .dot { width: 5px; height: 5px; border-radius: var(--radius-full); }
.status-badge.active { background: var(--mint-weak); color: var(--mint); }
.status-badge.active .dot { background: var(--mint); box-shadow: 0 0 4px var(--mint); }
.status-badge.inactive { background: rgba(85,96,120,0.12); color: var(--text-muted); }
.status-badge.inactive .dot { background: var(--text-muted); }
.status-badge.suspended { background: var(--amber-weak); color: var(--amber); }
.status-badge.suspended .dot { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.status-badge.deleted { background: var(--coral-weak); color: var(--coral); }
.status-badge.deleted .dot { background: var(--coral); }

.table-actions { display: flex; gap: 1px; justify-content: flex-end; }

.table-footer { display: flex; align-items: center; justify-content: space-between; padding: var(--space-4) var(--space-5); border-top: 1px solid var(--border-subtle); }
.table-info { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
.pagination { display: flex; gap: 1px; }
.page-btn {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); background: transparent; border: 1px solid transparent;
  color: var(--text-muted); font-family: var(--font-mono); font-size: 10.5px;
  cursor: pointer; transition: all var(--duration-fast) ease;
}
.page-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.page-btn.active { background: var(--cyan-weak); color: var(--cyan); border-color: rgba(0,229,255,0.3); }

/* === TAGS === */
.role-chip {
  display: inline-flex; align-items: center; gap: var(--space-1);
  padding: 1px 6px; border-radius: var(--radius-sm);
  background: var(--cyan-weak); color: var(--cyan);
  border: 1px solid rgba(0,229,255,0.2);
  font-family: var(--font-mono); font-size: 9px; font-weight: 500;
  margin: 1px;
}
.role-chip-more {
  display: inline-flex; align-items: center;
  padding: 1px 6px; border-radius: var(--radius-sm);
  background: var(--bg-hover); color: var(--text-muted);
  font-family: var(--font-mono); font-size: 9px;
  margin: 1px;
}
.perm-tag {
  display: inline-flex; align-items: center; padding: 1px 5px;
  border-radius: var(--radius-sm); font-family: var(--font-mono);
  font-size: 9px; font-weight: 500; letter-spacing: 0.3px;
  background: var(--bg-hover); color: var(--text-secondary); margin: 1px;
}
.scope-tag {
  font-family: var(--font-mono); font-size: 9px; padding: 1px 5px;
  border-radius: var(--radius-sm); background: var(--purple-weak);
  color: var(--purple); border: 1px solid rgba(168,85,247,0.2);
}
.scope-tags { display: flex; flex-wrap: wrap; gap: 2px; }

/* === EMPTY STATE === */
.empty-state { text-align: center; padding: var(--space-10) var(--space-7); color: var(--text-muted); }

/* === AUDIT LOG === */

                  item.id === 'oauth' ? State.data.oauthApps.filter(o => !o.deletedAt).length : '';

          </div></td></tr>`;

}

function renderAudit() {
  const logs = State.auditLogs;
  return `<div class="page-inner page-content">
    <div class="page-header">
      <div><h1 class="page-title">System Audit Log</h1><p class="page-subtitle">Complete trail · ${logs.length} events</p></div>
      <div class="page-actions"><span class="classification restricted">RESTRICTED</span></div>
    </div>
    <div class="table-container" style="padding:var(--space-6)">
      <div class="audit-timeline">
        ${logs.map(l => `<div class="audit-entry ${l.action}">
          <div class="audit-header"><span class="audit-action ${l.action}">${l.action.toUpperCase()}</span><span class="audit-target">${l.target}</span><span class="perm-tag">${l.section}</span></div>
          ${l.details ? `<div class="audit-details">${l.details}</div>` : ''}
          <div class="audit-meta"><span>By: ${l.actor}</span><span>IP: ${l.ip}</span><span>${fmtDateTime(l.timestamp)}</span></div>
        </div>`).join('')}
      </div>
    </div></div>`;
}

function renderSectionAudit(logs) {
  if (!logs.length) return `<div class="table-container" style="padding:var(--space-6)"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="empty-state-title">No events yet</div><div class="empty-state-desc">Actions will appear here</div></div></div>`;
  return `<div class="table-container" style="padding:var(--space-6)"><div class="audit-timeline">${logs.map(l => `<div class="audit-entry ${l.action}"><div class="audit-header"><span class="audit-action ${l.action}">${l.action.toUpperCase()}</span><span class="audit-target">${l.target}</span></div>${l.details?`<div class="audit-details">${l.details}</div>`:''}<div class="audit-meta"><span>By: ${l.actor}</span><span>IP: ${l.ip}</span><span>${fmtDateTime(l.timestamp)}</span></div></div>`).join('')}</div></div>`;
}

function switchTab(tab) { State.currentTab = tab; render(); }
function filterTable(q) { State.searchQuery = q; render(); }

// FORM PAGE: ROLE
// =====================================================
function renderRoleFormPage(id) {
  const r = id ? State.data.roles.find(x => x.id === id) : null;
  const isNew = !r;
  const selectedPerms = r ? [...r.permissions] : [];

  const permsByScope = {};
  State.data.permissions.filter(p => !p.deletedAt).forEach(p => {
    if (!permsByScope[p.scope]) permsByScope[p.scope] = [];
    permsByScope[p.scope].push(p);
  });

  const totalPerms = State.data.permissions.filter(p => !p.deletedAt).length;
  const userCount = r ? getUserCountForRole(r.id) : 0;

  return `
  <div class="form-page">
    <div class="form-header">
      <div class="form-header-left">
        <button class="form-back" onclick="closeForm()" title="Back to Roles">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <div class="form-title-group">
          <div class="form-title">${isNew ? 'Create New Role' : r.name}</div>
          <div class="form-subtitle">${isNew ? 'NEW ROLE DEFINITION' : r.slug.toUpperCase()}</div>
        </div>
      </div>
      <div class="form-header-right">
        ${!isNew ? `<div class="form-header-meta"><strong>${userCount} users</strong>ASSIGNED</div>` : ''}
        ${!isNew ? `<span class="classification ${r.classification}">${r.classification}</span>` : ''}
        <button class="btn btn-secondary" onclick="closeForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveRole('${id || ''}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          ${isNew ? 'Create Role' : 'Save Changes'}
        </button>
      </div>
    </div>

    <div class="form-body">
      <div class="form-grid">
        <div class="form-main">
          <!-- DEFINITION -->
          <div class="form-card accent-cyan">
            <div class="form-card-header">
              <div class="form-card-title-group">
                <div class="form-card-title">Role Definition</div>
                <div class="form-card-desc">Core identity and description</div>
              </div>
            </div>
            <div class="form-card-body">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Role Name <span class="required">*</span></label>
                  <input class="form-input" id="f_rname" value="${r?.name || ''}" placeholder="e.g. Content Manager">
                </div>
                <div class="form-group">
                  <label class="form-label">Slug <span class="required">*</span></label>
                  <input class="form-input" id="f_rslug" value="${r?.slug || ''}" placeholder="content_manager">
                  <div class="form-helper">Unique identifier used in API & code</div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-textarea" id="f_rdesc" placeholder="Describe what this role can do...">${r?.description || ''}</textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Classification</label>
                <select class="form-select" id="f_rclass">
                  <option value="public" ${r?.classification==='public'?'selected':''}>Public</option>
                  <option value="internal" ${r?.classification==='internal'?'selected':''}>Internal</option>
                  <option value="confidential" ${r?.classification==='confidential'?'selected':''}>Confidential</option>
                  <option value="restricted" ${r?.classification==='restricted'?'selected':''}>Restricted</option>
                </select>
              </div>
            </div>
          </div>

          <!-- PERMISSIONS BY SCOPE -->
          <div class="form-card accent-purple">
            <div class="form-card-header">
              <div class="form-card-title-group">
                <div class="form-card-title">Permissions</div>
                <div class="form-card-desc">${selectedPerms.length} of ${totalPerms} permissions assigned, organized by scope</div>
              </div>
              <span class="classification internal">${Object.keys(permsByScope).length} scopes</span>
            </div>
            <div class="form-card-body">
              <div class="scope-groups" id="permScopeGroups" data-selected='${JSON.stringify(selectedPerms)}'>
                ${Object.entries(permsByScope).map(([scope, perms]) => {
                  const count = perms.filter(p => selectedPerms.includes(p.id)).length;
                  return `
                    <div class="scope-group ${count > 0 ? 'expanded' : ''}" data-scope="${scope}">
                      <div class="scope-group-header" onclick="toggleScopeGroup('${scope}')">
                        <svg class="scope-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                        <span class="scope-group-title">${scope}</span>
                        <label class="scope-group-select-all" onclick="event.stopPropagation()">
                          <input type="checkbox" onchange="toggleScopeSelectAll('${scope}', this.checked)" ${count === perms.length ? 'checked' : ''}>
                          All
                        </label>
                        <span class="scope-group-count">${count} / ${perms.length}</span>
                      </div>
                      <div class="scope-group-body">
                        <div class="scope-group-list">
                          ${perms.map(p => `
                            <label class="perm-checkbox-item">
                              <input type="checkbox" value="${p.id}" ${selectedPerms.includes(p.id) ? 'checked' : ''} onchange="updateScopeGroupCount('${scope}')">
                              <div class="perm-checkbox-content">
                                <div class="perm-checkbox-name">${p.displayName}</div>
                                <div class="perm-checkbox-desc">${p.description}</div>
                              </div>
                            </label>
                          `).join('')}
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>

          ${!isNew ? `
          <!-- DANGER ZONE -->
          <div class="danger-zone">
            <div class="danger-zone-info">
              <div class="danger-zone-title">Archive this role</div>
              <div class="danger-zone-desc">${userCount > 0 ? `Cannot archive: ${userCount} user${userCount !== 1 ? 's are' : ' is'} assigned` : 'Soft-deletes the role. Can be restored later.'}</div>
            </div>
            <button class="btn btn-danger" ${userCount > 0 ? 'disabled' : ''} onclick="archiveRole('${r.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              Archive
            </button>
          </div>` : ''}
        </div>

        <!-- SIDE -->
        <div class="form-side">
          ${!isNew ? `
          <div class="form-card">
            <div class="form-card-header">
              <div class="form-card-title-group">
                <div class="form-card-title">Usage</div>
                <div class="form-card-desc">Assignment statistics</div>
              </div>
            </div>
            <div class="form-card-body">
              <div class="meta-list">
                <div class="meta-item"><div class="meta-label">Role ID</div><div class="meta-value mono">${r.id}</div></div>
                <div class="meta-item"><div class="meta-label">Created</div><div class="meta-value mono">${fmtDate(r.createdAt)}</div></div>
                <div class="meta-item"><div class="meta-label">Assigned Users</div><div class="meta-value">${userCount} user${userCount !== 1 ? 's' : ''}</div></div>
                <div class="meta-item"><div class="meta-label">Total Permissions</div><div class="meta-value">${r.permissions.length} of ${totalPerms}</div></div>
              </div>
            </div>
          </div>

          <div class="form-card">
            <div class="form-card-header">
              <div class="form-card-title-group">
                <div class="form-card-title">Assigned Users</div>
                <div class="form-card-desc">Who has this role</div>
              </div>
            </div>
            <div class="form-card-body">
              ${State.data.users.filter(u => !u.deletedAt && u.roles.includes(r.id)).length === 0
                ? '<div style="color:var(--text-muted);font-size:11px;padding:var(--space-3) 0">No users assigned</div>'
                : `<div style="display:flex;flex-direction:column;gap:var(--space-2)">
                    ${State.data.users.filter(u => !u.deletedAt && u.roles.includes(r.id)).slice(0, 5).map(u => `
                      <div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle)">
                        <div class="table-avatar ${avatarCls(u.id)}">${initials(u.name)}</div>
                        <div style="flex:1;min-width:0">
                          <div style="font-size:11.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.name}</div>
                          <div style="font-family:var(--font-mono);font-size:9.5px;color:var(--text-muted)">${u.email}</div>
                        </div>
                      </div>
                    `).join('')}
                  </div>`
              }
            </div>
          </div>` : `
          <div class="form-card">
            <div class="form-card-header">
              <div class="form-card-title-group">
                <div class="form-card-title">Permission Scopes</div>
                <div class="form-card-desc">${Object.keys(permsByScope).length} scopes available</div>
              </div>
            </div>
            <div class="form-card-body">
              <div style="display:flex;flex-direction:column;gap:var(--space-2)">
                ${Object.entries(permsByScope).map(([scope, perms]) => `
                  <div style="padding:var(--space-3);background:var(--bg-deep);border-radius:var(--radius-md);border:1px solid var(--border-subtle)">
                    <div style="font-family:var(--font-mono);font-size:10px;color:var(--purple);letter-spacing:1px;text-transform:uppercase">${scope}</div>
                    <div style="font-size:11.5px;color:var(--text-secondary);margin-top:2px">${perms.length} permission${perms.length !== 1 ? 's' : ''}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>`}
        </div>
      </div>
    </div>
  </div>`;
}

                  ${['read','write','admin','profile','report_view','api_read','api_write'].map(s => `
                    <label style="display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);cursor:pointer;transition:background var(--duration-fast) ease" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'">
                      <input type="checkbox" value="${s}" ${a?.scopes?.includes(s) ? 'checked' : ''} style="width:13px;height:13px;accent-color:var(--cyan);cursor:pointer">
                      <span style="font-size:11.5px;color:var(--text-secondary)">${s}</span>
                    </label>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>

          ${!isNew ? `
          <div class="danger-zone">
            <div class="danger-zone-info">
              <div class="danger-zone-title">Archive this application</div>
              <div class="danger-zone-desc">Soft-deletes the OAuth app. Can be restored later.</div>
            </div>
            <button class="btn btn-danger" onclick="archiveOAuth('${a.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              Archive
            </button>
          </div>` : ''}
        </div>

        <div class="form-side">
          ${!isNew ? `
          <div class="form-card">
            <div class="form-card-header">
              <div class="form-card-title-group">
                <div class="form-card-title">Credentials</div>
                <div class="form-card-desc">OAuth 2.0 client info</div>
              </div>
            </div>
            <div class="form-card-body">
              <div class="meta-list">
                <div class="meta-item">
                  <div class="meta-label">Client ID</div>
                  <div class="meta-value mono" style="display:flex;align-items:center;gap:var(--space-2)">${a.clientId}<button class="btn-icon" title="Copy" style="width:20px;height:20px" onclick="showToast('Client ID copied','info')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>
                </div>
                <div class="meta-item">
                  <div class="meta-label">Client Secret</div>
                  <div class="meta-value mono" style="display:flex;align-items:center;gap:var(--space-2)">••••••••••••••••<button class="btn-icon" title="Rotate" style="width:20px;height:20px" onclick="showToast('Secret rotated','warning')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button></div>
                </div>
                <div class="meta-item"><div class="meta-label">Created</div><div class="meta-value mono">${fmtDate(a.createdAt)}</div></div>
                <div class="meta-item"><div class="meta-label">Active Scopes</div><div class="meta-value">${a.scopes.length}</div></div>
              </div>
            </div>
          </div>` : `
          <div class="form-card">
            <div class="form-card-header">
              <div class="form-card-title-group">
                <div class="form-card-title">Registration</div>
                <div class="form-card-desc">What happens next</div>
              </div>
            </div>
            <div class="form-card-body">
              <div class="alert-box info" style="margin:0;padding:var(--space-4)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                <div class="alert-box-content">
                  <div class="alert-box-desc" style="font-size:11.5px">Upon registration, a unique client ID and secret will be generated. The secret will only be shown once.</div>
                </div>
              </div>
            </div>
          </div>`}
        </div>
      </div>
    </div>
  </div>`;
}

// =====================================================
// TAG SELECT (Multi-role)
// =====================================================
function initTagSelect() {
  const el = document.getElementById('roleTagSelect');
  if (!el) return;

  let selected = JSON.parse(el.dataset.selected || '[]');

  function render() {
    const available = State.data.roles.filter(r => !r.deletedAt);
    el.innerHTML = '';

    selected.forEach(roleId => {
      const role = available.find(r => r.id === roleId);
      if (!role) return;
      const chip = document.createElement('div');
      chip.className = 'tag-chip';
      chip.innerHTML = `
        <span class="tag-chip-text">${role.name}</span>
        <button class="tag-chip-remove" data-role="${roleId}" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      chip.querySelector('.tag-chip-remove').onclick = (e) => {
        e.stopPropagation();
        selected = selected.filter(id => id !== roleId);
        el.dataset.selected = JSON.stringify(selected);
        render();
        updateEffectivePerms();
      };
      el.appendChild(chip);
    });

    const inputWrap = document.createElement('div');
    inputWrap.style.cssText = 'flex:1;min-width:120px;position:relative;display:flex;';
    inputWrap.innerHTML = `
      <input class="tag-select-input" placeholder="${selected.length ? 'Add another role...' : 'Click to select roles...'}" readonly>
      <div class="dropdown-menu" id="roleDropdown"></div>
    `;
    el.appendChild(inputWrap);

    const input = inputWrap.querySelector('input');
    const dropdown = inputWrap.querySelector('.dropdown-menu');

    input.onclick = (e) => {
      e.stopPropagation();
      renderDropdown('');
      dropdown.classList.add('active');
      el.classList.add('active');
    };

    function renderDropdown(filter) {
      const filtered = available.filter(r =>
        !selected.includes(r.id) &&
        (r.name.toLowerCase().includes(filter.toLowerCase()) || r.slug.toLowerCase().includes(filter.toLowerCase()))
      );
      if (filtered.length === 0) {
        dropdown.innerHTML = `<div class="dropdown-empty">No available roles${selected.length ? ' to add' : ''}</div>`;
      } else {
        dropdown.innerHTML = `
          <div class="dropdown-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" placeholder="Search roles..." value="${filter}">
          </div>
          <div class="dropdown-list">
            ${filtered.map(r => `
              <div class="dropdown-item" data-role="${r.id}">
                <div class="dropdown-item-content">
                  <div class="dropdown-item-title">${r.name}</div>
                  <div class="dropdown-item-sub">${r.slug} · ${r.permissions.length} perms · ${getUserCountForRole(r.id)} users</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        const searchInput = dropdown.querySelector('.dropdown-search input');
        searchInput.oninput = (e) => { e.stopPropagation(); renderDropdown(e.target.value); setTimeout(() => searchInput.focus(), 0); };
        searchInput.onclick = (e) => e.stopPropagation();

        dropdown.querySelectorAll('.dropdown-item').forEach(item => {
          item.onclick = (e) => {
            e.stopPropagation();
            const roleId = item.dataset.role;
            if (!selected.includes(roleId)) {
              selected.push(roleId);
              el.dataset.selected = JSON.stringify(selected);
              render();
              updateEffectivePerms();
            }
          };
        });
      }
    }

    setTimeout(() => {
      document.addEventListener('click', function closeDD(e) {
        if (!el.contains(e.target)) {
          dropdown.classList.remove('active');
          el.classList.remove('active');
          document.removeEventListener('click', closeDD);
        }
      });
    }, 100);
  }

  render();
  updateEffectivePerms();
}

function updateEffectivePerms() {
  const el = document.getElementById('roleTagSelect');
  const target = document.getElementById('effectivePerms');
  if (!el || !target) return;

  const selected = JSON.parse(el.dataset.selected || '[]');
  if (selected.length === 0) {
    target.innerHTML = `<span style="color:var(--text-muted);font-size:11px;">Select roles to see effective permissions</span>`;
    return;
  }

  const permSet = new Set();
  selected.forEach(roleId => {
    const role = State.data.roles.find(r => r.id === roleId);
    if (role) role.permissions.forEach(p => permSet.add(p));
  });

  const perms = [...permSet].map(id => State.data.permissions.find(p => p.id === id)).filter(Boolean);

  if (perms.length === 0) {
    target.innerHTML = `<span style="color:var(--text-muted);font-size:11px;">No permissions in selected roles</span>`;
    return;
  }

  target.innerHTML = `<div class="scope-tags">${perms.map(p => `<span class="scope-tag" title="${p.description}">${p.displayName}</span>`).join('')}</div>`;
}

// =====================================================
// SCOPE GROUPS
// =====================================================
function initScopeGroups() {
  // Interactions handled via inline onclick
}

function toggleScopeGroup(scope) {
  const group = document.querySelector(`.scope-group[data-scope="${scope}"]`);
  if (group) group.classList.toggle('expanded');
}

function toggleScopeSelectAll(scope, checked) {
  const group = document.querySelector(`.scope-group[data-scope="${scope}"]`);
  if (!group) return;
  group.querySelectorAll('.scope-group-list input[type="checkbox"]').forEach(cb => {
    cb.checked = checked;
  });
  updateScopeGroupCount(scope);
}

function updateScopeGroupCount(scope) {
  const group = document.querySelector(`.scope-group[data-scope="${scope}"]`);
  if (!group) return;
  const checkboxes = group.querySelectorAll('.scope-group-list input[type="checkbox"]');
  const checked = group.querySelectorAll('.scope-group-list input[type="checkbox"]:checked');
  const countEl = group.querySelector('.scope-group-count');
  const selectAll = group.querySelector('.scope-group-select-all input');
  if (countEl) countEl.textContent = `${checked.length} / ${checkboxes.length}`;
  if (selectAll) selectAll.checked = checked.length === checkboxes.length;
  if (checked.length > 0) group.classList.add('expanded');
}

// =====================================================
// SAVE FUNCTIONS
// =====================================================
function saveUser(id) {
  const name = document.getElementById('f_name').value.trim();
  const email = document.getElementById('f_email').value.trim();
  const status = document.getElementById('f_status').value;
  const cls = document.getElementById('f_class').value;
  const rolesEl = document.getElementById('roleTagSelect');
  const roles = rolesEl ? JSON.parse(rolesEl.dataset.selected || '[]') : [];

  if (!name || !email) return showToast('Name and email are required', 'error');
  if (roles.length === 0) return showToast('Assign at least one role', 'error');

  if (id) {
    const u = State.data.users.find(x => x.id === id);
    Object.assign(u, { name, email, status, classification: cls, roles });
    addLog('users', 'update', name, `Updated (roles: ${roles.length}, status: ${status})`);
    showToast(`User "${name}" updated`, 'success');
  } else {
    State.data.users.push({
      id: genId('usr'), name, email, roles, status, classification: cls,
      createdAt: new Date().toISOString(), lastLogin: null, deletedAt: null
    });
    addLog('users', 'create', name, `Created with ${roles.length} role(s)`);
    showToast(`User "${name}" created`, 'success');
  }
  closeForm();
  renderNav();
}

function saveRole(id) {
  const name = document.getElementById('f_rname').value.trim();
  const slug = document.getElementById('f_rslug').value.trim();
  const desc = document.getElementById('f_rdesc').value.trim();
  const cls = document.getElementById('f_rclass').value;
  const perms = [...document.querySelectorAll('#permScopeGroups input[type="checkbox"]:checked')].map(cb => cb.value);

  if (!name || !slug) return showToast('Name and slug are required', 'error');

  if (id) {
    const r = State.data.roles.find(x => x.id === id);
    Object.assign(r, { name, slug, description: desc, classification: cls, permissions: perms });
    addLog('roles', 'update', name, `Updated (${perms.length} permissions)`);
    showToast(`Role "${name}" updated`, 'success');
  } else {
    State.data.roles.push({
      id: genId('role'), name, slug, description: desc, classification: cls,
      permissions: perms, createdAt: new Date().toISOString(), deletedAt: null
    });
    addLog('roles', 'create', name, `Created with ${perms.length} permissions`);
    showToast(`Role "${name}" created`, 'success');
  }
  closeForm();
  renderNav();
}

function savePerm(id) {
  const name = document.getElementById('f_pname').value.trim();
  const disp = document.getElementById('f_pdisp').value.trim();
  const desc = document.getElementById('f_pdesc').value.trim();
  const scope = document.getElementById('f_pscope').value;
  if (!name || !disp) return showToast('Key and display name required', 'error');
  if (id) {
    const p = State.data.permissions.find(x => x.id === id);
    Object.assign(p, { name, displayName: disp, description: desc, scope });
    addLog('permissions', 'update', disp, `Scope: ${scope}`);
    showToast(`"${disp}" updated`);
  } else {
    State.data.permissions.push({
      id: genId('perm'), name, displayName: disp, description: desc, scope,
      createdAt: new Date().toISOString(), deletedAt: null
    });
    addLog('permissions', 'create', disp, `Scope: ${scope}`);
    showToast(`"${disp}" created`);
  }
  closeForm();
}

function saveOAuth(id) {
  const name = document.getElementById('f_oname').value.trim();
  const uris = document.getElementById('f_ouri').value.trim().split('\n').filter(Boolean);
  const status = document.getElementById('f_ostatus').value;
  const cls = document.getElementById('f_oclass').value;
  const scopes = [...document.querySelectorAll('#f_oname').closest('.form-card-body').querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value);
  if (!name || !uris.length) return showToast('Name and redirect URI required', 'error');
  if (id) {
    const a = State.data.oauthApps.find(x => x.id === id);
    Object.assign(a, { name, redirectUris: uris, status, classification: cls, scopes });
    addLog('oauth', 'update', name, `Status: ${status}`);
    showToast(`"${name}" updated`);
  } else {
    const cid = `cli_${name.toLowerCase().replace(/\s+/g,'_')}_${Math.random().toString(36).substr(2,8)}`;
    State.data.oauthApps.push({
      id: genId('oauth'), name, clientId: cid, redirectUris: uris, scopes, status, classification: cls,
      createdAt: new Date().toISOString(), deletedAt: null
    });
    addLog('oauth', 'create', name, `Client: ${cid}`);
    showToast(`"${name}" registered`);
  }
  closeForm();
  renderNav();
}

function archiveUser(id) {
  const u = State.data.users.find(x => x.id === id);
  if (!u) return;
  if (confirm(`Archive "${u.name}"? This is a soft delete.`)) {
    u.deletedAt = new Date().toISOString();
    addLog('users', 'delete', u.name, 'User archived');
    showToast(`"${u.name}" archived`, 'warning');
    closeForm();
    renderNav();
  }
}

function archiveRole(id) {
  const r = State.data.roles.find(x => x.id === id);
  if (!r) return;
  if (getUserCountForRole(r.id) > 0) return showToast('Cannot archive: users assigned', 'error');
  if (confirm(`Archive "${r.name}"?`)) {
    r.deletedAt = new Date().toISOString();
    addLog('roles', 'delete', r.name, 'Role archived');
    showToast(`"${r.name}" archived`, 'warning');
    closeForm();
    renderNav();
  }
}

function archivePerm(id) {
  const p = State.data.permissions.find(x => x.id === id);
  if (!p) return;
  if (confirm(`Archive "${p.displayName}"?`)) {
    p.deletedAt = new Date().toISOString();
    addLog('permissions', 'delete', p.displayName, 'Permission archived');
    showToast(`"${p.displayName}" archived`, 'warning');
    closeForm();
  }
}

function archiveOAuth(id) {
  const a = State.data.oauthApps.find(x => x.id === id);
  if (!a) return;
  if (confirm(`Archive "${a.name}"?`)) {
    a.deletedAt = new Date().toISOString();
    addLog('oauth', 'delete', a.name, 'OAuth app archived');
    showToast(`"${a.name}" archived`, 'warning');
    closeForm();
    renderNav();
  }
}

// =====================================================
// INIT
// =====================================================
renderNav();
render();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && State.formMode) closeForm();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('globalSearch').focus(); }
});
</script>
